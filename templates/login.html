<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Psycho Multi Agent – Beta Login</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f6f7f9; margin: 0; color: #222; }
    .wrap { max-width: 420px; margin: 12vh auto; background: white; padding: 2rem; border-radius: 14px; box-shadow: 0 12px 30px rgba(0,0,0,.08); }
    h1 { margin: 0 0 1rem 0; font-size: 1.5rem; }
    p { color: #555; }
    label { display: block; margin-top: 1rem; margin-bottom: .5rem; }
    input[type="password"] { width: 100%; padding: .85rem; border-radius: 10px; border: 1px solid #ccc; box-sizing: border-box; }
    button { width: 100%; margin-top: 1rem; padding: .85rem; border: 0; border-radius: 10px; cursor: pointer; }
    .error { color: #b00020; margin-top: .5rem; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Psycho Multi Agent – Beta</h1>
    <p>Geschützter Testbereich für balint-bamberg.de.</p>

    {% if error %}
      <div class="error">{{ error }}</div>
    {% endif %}

    <form method="post">
      <label for="password">Passwort</label>
      <input type="password" id="password" name="password" required>
      <button type="submit">Anmelden</button>
    </form>
  </div>
</body>
</html>
